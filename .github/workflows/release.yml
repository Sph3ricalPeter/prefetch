name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            runner: windows-latest
            platform: windows
          - label: macOS arm64
            runner: macos-latest
            platform: macos
            args: --target aarch64-apple-darwin
          - label: macOS x64
            runner: macos-13
            platform: macos
            args: --target x86_64-apple-darwin

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Prefetch ${{ github.ref_name }}"
          releaseBody: |
            Download the installer for your platform:
            - **Windows**: `.msi` or `.exe` (NSIS installer)
            - **macOS Apple Silicon**: `_aarch64.dmg`
            - **macOS Intel**: `_x64.dmg`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  update-landing-page:
    name: Update landing page version
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update version in docs/index.html
        run: |
          VERSION="${GITHUB_REF_NAME}"
          sed -i "s/v[0-9]\+\.[0-9]\+\.[0-9]\+ \&mdash; now available/${VERSION} \&mdash; now available/" docs/index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --quiet docs/index.html && exit 0
          git add docs/index.html
          git commit -m "docs: update landing page version to ${GITHUB_REF_NAME}"
          git push
