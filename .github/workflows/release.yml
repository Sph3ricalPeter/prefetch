name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-notes:
    name: Generate release notes
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.notes.outputs.body }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build release notes from commits
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          # Collect feat and fix commits (conventional-commit prefixes)
          FEATURES=$(git log $RANGE --pretty=format:"%s" --grep="^feat" -i | head -5)
          FIXES=$(git log $RANGE --pretty=format:"%s" --grep="^fix" -i | head -5)

          # Build top-5 list: features first (more relevant), then fixes
          ITEMS=""
          COUNT=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            [ $COUNT -ge 5 ] && break
            ITEMS="${ITEMS}- ${line}\n"
            COUNT=$((COUNT + 1))
          done <<< "$FEATURES"

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            [ $COUNT -ge 5 ] && break
            ITEMS="${ITEMS}- ${line}\n"
            COUNT=$((COUNT + 1))
          done <<< "$FIXES"

          if [ -z "$ITEMS" ]; then
            ITEMS="- Various improvements and maintenance updates\n"
          fi

          {
            echo "body<<RELEASE_EOF"
            echo "## What's New in ${TAG}"
            echo ""
            echo -e "$ITEMS"
            echo "---"
            echo ""
            echo "Download the installer for your platform:"
            echo "- **Windows**: \`.msi\` or \`.exe\` (NSIS installer)"
            echo "- **macOS Apple Silicon**: \`.dmg\`"
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.label }})
    needs: release-notes
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            runner: windows-latest
            platform: windows
          - label: macOS arm64
            runner: macos-latest
            platform: macos
            args: --target aarch64-apple-darwin

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos' && 'aarch64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Prefetch ${{ github.ref_name }}"
          releaseBody: ${{ needs.release-notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  update-landing-page:
    name: Update landing page version
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Update version in docs/index.html
        run: |
          VERSION="${GITHUB_REF_NAME}"
          sed -i "s/v[0-9]\+\.[0-9]\+\.[0-9]\+ \&mdash; now available/${VERSION} \&mdash; now available/" docs/index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --quiet docs/index.html && exit 0
          git add docs/index.html
          git commit -m "docs: update landing page version to ${GITHUB_REF_NAME}"
          git push
